<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DocuMind Backend Monitor</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --line: #d9e2ef;
      --text: #172236;
      --muted: #51617a;
      --primary: #0e5fd7;
      --ok-bg: #eff9f2;
      --ok-border: #b8e0c3;
      --ok-text: #145130;
      --bad-bg: #fff3f4;
      --bad-border: #f2c3c7;
      --bad-text: #8f1c28;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: linear-gradient(180deg, #f9fbff 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
    }

    .container {
      width: min(980px, 100%);
      margin: 32px auto;
      padding: 0 16px;
      display: grid;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 8px 30px rgba(26, 47, 86, 0.07);
    }

    h1 {
      margin: 0;
      font-size: 1.6rem;
    }

    .sub {
      margin-top: 8px;
      color: var(--muted);
    }

    .row {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .field {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    label {
      font-weight: 600;
      color: #23334a;
      font-size: 0.92rem;
    }

    input,
    textarea,
    button {
      font: inherit;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid #c8d4e7;
      border-radius: 10px;
      padding: 10px 12px;
      background: #ffffff;
      color: var(--text);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      background: #e9effa;
      color: #20304b;
    }

    button.primary {
      background: var(--primary);
      color: #ffffff;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .kpis {
      margin-top: 12px;
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .kpi {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #f8fbff;
    }

    .kpi .name {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .kpi .value {
      margin-top: 4px;
      font-size: 1.12rem;
      font-weight: 700;
    }

    .panel {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      background: #fbfdff;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 340px;
      overflow: auto;
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.86rem;
    }

    .status {
      margin-top: 12px;
      border: 1px solid;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 600;
    }

    .status.ok {
      background: var(--ok-bg);
      border-color: var(--ok-border);
      color: var(--ok-text);
    }

    .status.bad {
      background: var(--bad-bg);
      border-color: var(--bad-border);
      color: var(--bad-text);
    }

    @media (max-width: 820px) {
      .row,
      .kpis {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>DocuMind Backend Monitor</h1>
      <p class="sub">Simple UI to upload a document, run a query, and track backend performance.</p>

      <div class="row">
        <div class="field">
          <label for="backend-url">Backend URL</label>
          <input id="backend-url" type="text" value="http://localhost:8000" />
        </div>
        <div class="field">
          <label for="health-path">Health Path</label>
          <input id="health-path" type="text" value="/health" />
        </div>
      </div>

      <div class="actions">
        <button id="btn-health" class="primary" type="button">Check Health</button>
      </div>
      <div id="health-status" class="status" hidden></div>
    </section>

    <section class="card">
      <h2>1) Upload Document</h2>
      <div class="field">
        <label for="file-input">Choose file</label>
        <input id="file-input" type="file" />
      </div>
      <div class="actions">
        <button id="btn-upload" class="primary" type="button">Upload</button>
      </div>
    </section>

    <section class="card">
      <h2>2) Ask Query</h2>
      <div class="field">
        <label for="query-input">Question</label>
        <textarea id="query-input" placeholder="Ask about the uploaded document..."></textarea>
      </div>
      <div class="actions">
        <button id="btn-ask" class="primary" type="button">Ask</button>
      </div>

      <div class="kpis">
        <div class="kpi">
          <div class="name">Upload Latency</div>
          <div id="kpi-upload" class="value">-</div>
        </div>
        <div class="kpi">
          <div class="name">Query Latency</div>
          <div id="kpi-query" class="value">-</div>
        </div>
        <div class="kpi">
          <div class="name">Backend Model Time</div>
          <div id="kpi-model" class="value">-</div>
        </div>
      </div>

      <div class="field">
        <label>Last Response</label>
        <div id="response-panel" class="panel">No response yet.</div>
      </div>
    </section>
  </main>

  <script>
    const ui = {
      backendUrl: document.getElementById('backend-url'),
      healthPath: document.getElementById('health-path'),
      fileInput: document.getElementById('file-input'),
      queryInput: document.getElementById('query-input'),
      healthBtn: document.getElementById('btn-health'),
      uploadBtn: document.getElementById('btn-upload'),
      askBtn: document.getElementById('btn-ask'),
      healthStatus: document.getElementById('health-status'),
      responsePanel: document.getElementById('response-panel'),
      kpiUpload: document.getElementById('kpi-upload'),
      kpiQuery: document.getElementById('kpi-query'),
      kpiModel: document.getElementById('kpi-model')
    };

    function baseUrl() {
      return ui.backendUrl.value.trim().replace(/\/+$/, '');
    }

    function buildUrl(path) {
      const normalized = path.startsWith('/') ? path : `/${path}`;
      return `${baseUrl()}${normalized}`;
    }

    function setHealth(ok, message) {
      ui.healthStatus.hidden = false;
      ui.healthStatus.className = `status ${ok ? 'ok' : 'bad'}`;
      ui.healthStatus.textContent = message;
    }

    function setPanel(data) {
      ui.responsePanel.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
    }

    async function timedFetch(url, options) {
      const started = performance.now();
      const response = await fetch(url, options);
      const elapsedMs = Math.round(performance.now() - started);
      return { response, elapsedMs };
    }

    async function checkHealth() {
      ui.healthBtn.disabled = true;
      try {
        const healthUrl = buildUrl(ui.healthPath.value.trim() || '/health');
        const { response, elapsedMs } = await timedFetch(healthUrl, { method: 'GET' });
        const body = await response.text();
        if (response.ok) {
          setHealth(true, `Healthy (${response.status}) in ${elapsedMs} ms`);
        } else {
          setHealth(false, `Health check failed (${response.status}) in ${elapsedMs} ms`);
        }
        setPanel({ url: healthUrl, status: response.status, latency_ms: elapsedMs, body });
      } catch (error) {
        setHealth(false, `Health check request failed: ${error}`);
      } finally {
        ui.healthBtn.disabled = false;
      }
    }

    async function uploadFile() {
      const file = ui.fileInput.files[0];
      if (!file) {
        setPanel('Please select a file before uploading.');
        return;
      }

      ui.uploadBtn.disabled = true;
      try {
        const form = new FormData();
        form.append('files', file);

        const { response, elapsedMs } = await timedFetch(buildUrl('/upload'), {
          method: 'POST',
          body: form
        });

        const payload = await response.json();
        ui.kpiUpload.textContent = `${elapsedMs} ms`;

        if (!response.ok) {
          setPanel({ stage: 'upload', status: response.status, payload });
          return;
        }

        setPanel({ stage: 'upload', status: response.status, latency_ms: elapsedMs, payload });
      } catch (error) {
        setPanel(`Upload failed: ${error}`);
      } finally {
        ui.uploadBtn.disabled = false;
      }
    }

    async function askQuestion() {
      const question = ui.queryInput.value.trim();
      if (!question) {
        setPanel('Please enter a question before asking.');
        return;
      }

      ui.askBtn.disabled = true;
      try {
        const { response, elapsedMs } = await timedFetch(buildUrl('/ask'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });

        const payload = await response.json();
        ui.kpiQuery.textContent = `${elapsedMs} ms`;

        const modelSeconds = payload?.meta?.duration_s;
        ui.kpiModel.textContent = typeof modelSeconds === 'number' ? `${modelSeconds.toFixed(2)} s` : '-';

        setPanel({ stage: 'ask', status: response.status, latency_ms: elapsedMs, payload });
      } catch (error) {
        setPanel(`Ask failed: ${error}`);
      } finally {
        ui.askBtn.disabled = false;
      }
    }

    ui.healthBtn.addEventListener('click', checkHealth);
    ui.uploadBtn.addEventListener('click', uploadFile);
    ui.askBtn.addEventListener('click', askQuestion);
  </script>
</body>
</html>
